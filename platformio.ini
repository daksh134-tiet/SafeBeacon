; SafeBeacon — PlatformIO build configuration
; Target: ESP32-WROOM-32 | Framework: Arduino

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Upload settings
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_FREERTOS_HZ=1000
    -DBOARD_HAS_PSRAM
    -std=c++17

; Dependencies
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5
    mikalhart/TinyGPSPlus @ ^1.0.3
    electroniccats/MPU6050 @ ^1.3.0

; Partition scheme — larger app partition
board_build.partitions = min_spiffs.csv

; OTA update support
upload_protocol = espota
; upload_port = safebeacon.local    ; Uncomment for OTA

[env:esp32dev_debug]
extends     = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DDEBUG_SERIAL=true
    -DDEBUG_OBD=true
    -DDEBUG_IMU=true
    -DCORE_DEBUG_LEVEL=3
